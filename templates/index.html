<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standup Summarizer</title>
    <style>
        /* Basic styling to make it look clean on your screen */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; color: #333; }
        textarea { width: 100%; height: 150px; margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="range"], select, input[type="number"] { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { background-color: #007aff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background-color: #005bb5; }
        
        /* The output box is hidden by default */
        #output-container { margin-top: 30px; padding: 20px; background-color: #f5f5f7; border-radius: 8px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Standup Summarizer</h1>
    <p>Paste your chaotic standup notes below to get a clean summary.</p>

    <textarea id="standup-text" placeholder="Paste your standup transcript or notes here..."></textarea>

    <div class="control-group">
        <label for="length-slider">Summary Length: <span id="length-display">50</span>%</label>
        <input type="range" id="length-slider" min="10" max="100" value="50">
    </div>

    <div class="control-group">
        <label for="format-select">Output Format:</label>
        <select id="format-select">
            <option value="paragraphs">Paragraphs</option>
            <option value="points">Bullet Points</option>
            <option value="slides">Presentation Slides</option>
        </select>
    </div>

    <div class="control-group hidden" id="slide-count-group">
        <label for="slide-count">Number of Slides:</label>
        <input type="number" id="slide-count" min="1" max="20" value="3">
    </div>

    <button id="summarize-btn">Generate Summary</button>

    <div id="output-container">
        <h3>Your Summary:</h3>
        <div id="summary-result"></div>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        // 1. Grab references to our HTML elements
        const slider = document.getElementById('length-slider');
        const lengthDisplay = document.getElementById('length-display');
        const formatSelect = document.getElementById('format-select');
        const slideCountGroup = document.getElementById('slide-count-group');
        const summarizeBtn = document.getElementById('summarize-btn');
        const outputContainer = document.getElementById('output-container');
        const summaryResult = document.getElementById('summary-result');

        // 2. Update the number next to the slider in real-time
        slider.addEventListener('input', function() {
            lengthDisplay.textContent = this.value;
        });

        // 3. Show/Hide the "Slide Count" input based on the dropdown choice
        formatSelect.addEventListener('change', function() {
            if (this.value === 'slides') {
                slideCountGroup.classList.remove('hidden');
            } else {
                slideCountGroup.classList.add('hidden');
            }
        });

        // 4. The main function that runs when the button is clicked
        summarizeBtn.addEventListener('click', async function() {
            // Gather the data from the UI
            const textData = document.getElementById('standup-text').value;
            const lengthData = parseInt(slider.value);
            const formatData = formatSelect.value;
            const slideCountData = parseInt(document.getElementById('slide-count').value);

            // Basic validation
            if (!textData.trim()) {
                alert("Please enter some text to summarize!");
                return;
            }

            // Change button text so the user knows it's working
            summarizeBtn.textContent = "Summarizing...";

            try {
                // Send a POST request to our FastAPI backend using the Fetch API
                const response = await fetch('/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: textData,
                        length: lengthData,
                        format_type: formatData,
                        slide_count: slideCountData
                    })
                });

                // Parse the JSON response from the server
                const result = await response.json();

                // Display the result in the UI
                summaryResult.textContent = result.summary;
                outputContainer.style.display = 'block';

            } catch (error) {
                summaryResult.textContent = "An error occurred connecting to the server.";
                outputContainer.style.display = 'block';
            } finally {
                // Reset the button text
                summarizeBtn.textContent = "Generate Summary";
            }
        });
    </script>
</body>
</html>
